<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Smart Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!-- LOGIN EKRANI -->
  <div id="login-view">
    <div class="card">
      <h1>👋 Xush kelibsiz</h1>
      <p>Dashboardingizga kirish uchun Google hisobingizdan foydalaning</p>
      <div id="g_id_signin"></div>
    </div>
  </div>

  <!-- DASHBOARD EKRANI -->
  <div id="dashboard-view" style="display:none;">
    <header>
      <div class="user-info">
        <img id="user-img" src="" alt="User">
        <div>
          <h2 id="user-name"></h2>
          <p id="user-email"></p>
        </div>
      </div>
      <div class="controls">
        <button id="theme-btn">🌙</button>
        <button id="logout-btn">Chiqish</button>
      </div>
    </header>

    <main>
      <section class="notes">
        <h3>📝 Eslatmalar</h3>
        <textarea id="note-input" placeholder="Yangi eslatma yozing..."></textarea>
        <button id="add-note-btn">Qo'shish</button>
        <ul id="notes-list"></ul>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
